name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Run ruff lint
        run: ruff check erpnext_banking tests
      - name: Run ruff format check
        run: ruff format --check erpnext_banking tests
